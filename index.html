<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F.R.I.E.N.D. TC-52 Mock</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050505;font-family:Arial,Helvetica,sans-serif}
body{display:flex;align-items:center;justify-content:center}
.device{width:min(100vw,405px);height:min(100vh,812px);background:#070707;border:10px solid #111;border-radius:34px;padding:8px}
.screen{width:100%;height:100%;background:linear-gradient(160deg,#06284f,#06172c 65%,#020914);color:white;border-radius:22px;padding:8px;display:flex;flex-direction:column;overflow:hidden}
.status{height:18px;display:flex;justify-content:space-between;font-size:11px;opacity:.9}
.brand{height:63px;display:flex;gap:8px;align-items:center;border-bottom:1px solid rgba(255,255,255,.25);padding-bottom:6px}
.logo{background:#e31837;border:2px solid white;width:96px;height:54px;display:flex;flex-direction:column;justify-content:center;padding-left:5px;line-height:.9;flex-shrink:0}
.logo .king{font-size:27px;font-weight:950;letter-spacing:-1px}
.logo .soopers{color:#ffd200;font-size:21px;font-weight:950;font-style:italic;text-shadow:1px 1px #003b71}
.brand h1{margin:0;font-size:27px;letter-spacing:1px}
.brand p{margin:1px 0 0;font-size:11px;font-weight:700;line-height:1.15}
.nav{height:43px;display:grid;grid-template-columns:1fr 1fr 1.6fr;gap:6px;padding:6px 0}
button{border:none;cursor:pointer;touch-action:manipulation;font-family:inherit}
.nav button,.demo button,.action{border-radius:9px;font-weight:950;font-size:12px;color:white;background:#0d3768;border:1px solid rgba(255,255,255,.22)}
.nav .yellow,.demo button{background:#ffd200;color:#06284f}
.demo{height:36px;margin-bottom:5px}
.demo button{width:100%;height:100%;font-size:14px}
.app-view{flex:1;min-height:0;overflow:hidden}
.home{height:100%;display:grid;grid-template-rows:34px 180px 94px;gap:7px}
.summary{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.22);border-radius:12px;display:grid;grid-template-columns:1.3fr 1fr 1.7fr;align-items:center;text-align:center;font-size:11px;font-weight:900}
.summary b{color:#ffd200;font-size:14px}
.center{display:grid;grid-template-columns:92px 1fr 92px;gap:7px;align-items:center}
.stack{display:grid;gap:6px}
.pill{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.22);border-radius:12px;min-height:50px;padding:7px 5px;text-align:center;font-size:10px;font-weight:850}
.pill b{display:block;font-size:17px;color:#8df13d;margin-top:2px}
.pill.warn b{color:#ffd200}
.circle{margin:0 auto;width:170px;height:170px;border-radius:50%;background:radial-gradient(circle,#09285a,#020914);border:9px solid #62c832;outline:5px solid rgba(255,210,0,.78);display:flex;flex-direction:column;justify-content:center;text-align:center;padding:12px}
.circle .dept{font-size:19px;font-weight:950}
.circle .score{font-size:42px;font-weight:950;line-height:.95}
.circle .label{font-size:10px;font-weight:950;color:#8df13d}
.circle .mt{color:#ffd200;font-size:9px;font-weight:950;margin-top:6px}
.circle .mission{font-size:11px;font-weight:900;line-height:1.05}
.mission-card{background:#f7f9fc;color:#071a34;border-radius:12px;padding:8px}
.mission-card h3{margin:0;font-size:12px;color:#c61f32}
.mission-card p{margin:3px 0 0;font-size:12px;font-weight:850}
.panel{height:100%;background:#f7f9fc;color:#071a34;border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.panel header{height:42px;background:#c61f32;color:white;display:flex;align-items:center;justify-content:center;font-weight:950;font-size:16px}
.panel.blue header{background:#082b55}
.panel.green header{background:#237d20}
.panel.purple header{background:#56338f}
.panel.gold header{background:#ffd200;color:#06284f}
.panel-body{flex:1;padding:9px;overflow:hidden}
.panel h2,.panel h3{margin:0 0 6px;font-size:16px}
.row{min-height:32px;display:flex;justify-content:space-between;align-items:center;gap:7px;border-bottom:1px solid #d6dde7;padding:5px 0;font-size:12px}
.row:last-child{border-bottom:none}
.row small{font-size:10px;color:#52606f}
.badge{background:#e8f6e5;color:#237d20;padding:4px 7px;border-radius:999px;font-weight:950;white-space:nowrap}
.good{color:#237d20;font-weight:950}
.risk{color:#c61f32;font-weight:950}
.warn{color:#d09100;font-weight:950}
.action{width:100%;height:38px;margin-top:7px;background:#082b55;font-size:13px}
.action.green{background:#237d20}
.action.red{background:#c61f32}
.choice{width:100%;height:50px;background:white;border:1px solid #ccd4df;border-radius:11px;padding:0 14px;margin:7px 0;display:flex;justify-content:space-between;align-items:center;color:#071a34;font-size:15px;font-weight:950}
.progress{height:11px;background:#dce3ee;border-radius:999px;overflow:hidden;margin:7px 0}
.progress span{display:block;height:100%;background:#237d20}
.buttons{height:142px;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding-top:7px;flex-shrink:0}
.buttons button{border-radius:10px;background:linear-gradient(#fff,#dce9f7);color:#082b55;font-weight:950;font-size:18px}
.buttons span{display:block;font-size:9px;margin-top:2px}
footer{height:20px;text-align:center;color:#31b9ff;font-weight:900;font-size:11px;padding-top:5px;flex-shrink:0}
button:active{transform:scale(.96)}
@media(max-height:720px){
.device{height:100vh;border-width:6px;border-radius:22px}
.screen{border-radius:16px;padding:6px}
.brand{height:55px}
.logo{width:86px;height:48px}
.logo .king{font-size:24px}
.logo .soopers{font-size:18px}
.brand h1{font-size:23px}
.demo{height:32px}
.home{grid-template-rows:32px 164px 84px}
.circle{width:154px;height:154px}
.buttons{height:126px}
}
</style>
</head>

<body>
<main class="device">
<section class="screen">

<div class="status">
<span>8:42 AM</span>
<span>TC-52 · Wi-Fi · 100%</span>
</div>

<header class="brand">
<div class="logo">
<div class="king">KING</div>
<div class="soopers">Soopers</div>
</div>
<div>
<h1>F.R.I.E.N.D.</h1>
<p>Fresh Retail Intelligence<br>Navigation & Development</p>
</div>
</header>

<nav class="nav">
<button id="backBtn">← Back</button>
<button id="homeBtn">⌂ Home</button>
<button id="deptBtn" class="yellow">Toggle Dept ↻</button>
</nav>

<div class="demo">
<button id="demoBtn">▶ Executive Demo Mode</button>
</div>

<section id="appView" class="app-view"></section>

<section class="buttons">
<button data-screen="orders">📋<span>Orders</span></button>
<button data-screen="temperature">🌡️<span>Temp</span></button>
<button data-screen="production">👨‍🍳<span>Production</span></button>
<button data-screen="replenishment">🛒<span>Replenish</span></button>
<button data-screen="freshStart">📖<span>Fresh Start</span></button>
<button data-screen="training">🎓<span>Training</span></button>
<button data-screen="alerts">🔔<span>Alerts</span></button>
<button data-screen="mission">🎯<span>Mission</span></button>
<button data-screen="leader">👥<span>Leader</span></button>
<button data-screen="results">📊<span>Results</span></button>
</section>

<footer>One System. One Team. Smarter Decisions.</footer>

</section>
</main>

<script>
const departments=[
{name:"DELI",score:94,metrics:{"Food Safety":98,Production:91,Replenishment:95,Training:96,Labor:87},mission:"Complete Hot Holding Walk",impact:"+8% Compliance · +3% Labor",order:[["Rotisserie","+12 ea","High trend"],["Tenders","+8 lb","Promo"],["Party Trays","+6 ea","Events"],["Cheese","+5 lb","Low OH"]],production:[["Rotisserie","Start","Lunch/Dinner"],["Grab & Go","+18","Velocity"],["Party Trays","6","Event support"]],replenishment:["Service Case","Grab & Go","Hot Case","Cheese Wall","Salad Case"],tempStep:"Chicken Hot Case",tempRange:"140°+",training:"Food Safety Fundamentals",alert:"Hot holding check due in 15 minutes."},
{name:"MEAT",score:92,metrics:{"Food Safety":97,Production:92,Replenishment:93,Training:94,Labor:89},mission:"Validate Case Fullness",impact:"-6% Shrink · +4% Readiness",order:[["Ground Beef","+18 lb","Demand"],["Chicken","+10 cs","Ad"],["Salmon","+6 lb","Low"],["Steak","+12 lb","Weekend"]],production:[["Grind Log","Complete","Compliance"],["Cuts","+10 trays","Peak"],["Seafood","Refresh","Quality"]],replenishment:["Ground Beef","Chicken","Steaks","Seafood","Service Case"],tempStep:"Seafood Case",tempRange:"32°–41°",training:"Rotation and Markdowns",alert:"Seafood display below standard."},
{name:"PRODUCE",score:96,metrics:{"Food Safety":96,Production:94,Replenishment:98,Training:97,Labor:91},mission:"Replenish Wet Rack",impact:"+9% Replenishment",order:[["Bananas","+20 cs","Top mover"],["Berries","+12 cs","Display"],["Salads","+8 cs","Lunch"],["Wet Rack","+10 cs","Freshness"]],production:[["Cut Fruit","+24","Sales"],["Veg Trays","+8","Weekend"],["Fruit Bowls","+12","Pickup"]],replenishment:["Wet Rack","Bananas","Berries","Salads","Promo Display"],tempStep:"Cut Fruit Case",tempRange:"32°–41°",training:"Culling and Freshness",alert:"Berry display requires culling."},
{name:"BAKERY",score:88,metrics:{"Food Safety":94,Production:84,Replenishment:88,Training:92,Labor:86},mission:"Refill Bread Wall",impact:"+7% Production Accuracy",order:[["French Bread","+30","Low shelf"],["Cookies","+18","Demand"],["Cake Kits","+6","Forecast"],["Donuts","+10 dz","Morning"]],production:[["Bread Wall","Now","Opportunity"],["Cookies","+18","Sales"],["Donuts","Prep","Readiness"]],replenishment:["Bread Wall","Cake Case","Cookie Table","Donut Case","Seasonal"],tempStep:"Bakery Freezer",tempRange:"0° or below",training:"Production Timing",alert:"Production behind plan."},
{name:"GROCERY",score:91,metrics:{"In Stock":93,Condition:90,Replenishment:94,Training:91,Labor:88},mission:"Scan Top Out-of-Stocks",impact:"+5% In-Stock",order:[["Ad Soda","+20 cs","Promo"],["Cereal","+8 cs","Low"],["Dairy","+10 cs","Traffic"],["Frozen","+7 cs","Demand"]],production:[["Top Stock","Pull","OOS"],["Ad Display","Fill","Promo"],["Backroom","Scan","Accuracy"]],replenishment:["Aisle 8","Dairy","Frozen","Ad Displays","Top Sellers"],tempStep:"Dairy Case",tempRange:"32°–41°",training:"Conditioning and Pulls",alert:"Aisle 8 has OOS risks."},
{name:"FRONT END",score:90,metrics:{Service:94,"Wait Time":92,Training:91,Supplies:89,Labor:86},mission:"Open One More Lane",impact:"-4% Wait Time",order:[["Bags","+4 cases","Supply"],["Paper","+2 cases","Lane"],["Impulse","+6 cases","Sales"],["Tape","+2 cases","Critical"]],production:[["Lane 5","Open","Wait"],["SCO","Support","Flow"],["Service Desk","Assist","Customer"]],replenishment:["Bags","Impulse","SCO","Registers","Service Desk"],tempStep:"No temp task",tempRange:"Service flow",training:"Service Recovery",alert:"Checkout wait time rising."},
{name:"PICKUP",score:97,metrics:{Accuracy:99,"On Time":96,Replenishment:94,Training:98,Labor:92},mission:"Prioritize Next Wave",impact:"+10% Accuracy",order:[["Bags","+5 cases","Staging"],["Totes","+12","Wave"],["Cold Packs","+8","Safety"],["Labels","+4","Critical"]],production:[["Pick Wave","Start","On-time"],["Subs","Verify","Accuracy"],["Staging","Audit","Handoff"]],replenishment:["Next Wave","Cold Staging","Frozen","Unavailable","Handoff"],tempStep:"Cold Staging",tempRange:"32°–41°",training:"Substitutions and Staging",alert:"Next wave begins in 20 minutes."}
];

let deptIndex=0;
let historyStack=[];
let currentScreen="home";
let demoStep=0;
const demoFlow=["home","freshStart","temperature","mission","deptLeader","storeLeader","districtLeader","results"];
const appView=document.getElementById("appView");

function dept(){return departments[deptIndex]}

function setScreen(screen,push=true){
if(push&&currentScreen!==screen)historyStack.push(currentScreen);
currentScreen=screen;
render();
}

function render(){
const d=dept();
const screens={
home:()=>renderHome(d),
orders:()=>renderOrders(d),
temperature:()=>renderTemperature(d),
production:()=>renderProduction(d),
replenishment:()=>renderReplenishment(d),
freshStart:()=>renderFreshStart(d),
training:()=>renderTraining(d),
alerts:()=>renderAlerts(d),
mission:()=>renderMission(d),
leader:()=>renderLeader(),
deptLeader:()=>renderDeptLeader(d),
storeLeader:()=>renderStoreLeader(),
districtLeader:()=>renderDistrictLeader(),
results:()=>renderResults()
};
screens[currentScreen]();
}

function renderHome(d){
const keys=Object.keys(d.metrics);
appView.innerHTML=`
<div class="home">
<div class="summary">
<div>Dept<br><b>${d.name}</b></div>
<div>Score<br><b>${d.score}%</b></div>
<div>Impact<br><b>${d.impact}</b></div>
</div>

<div class="center">
<div class="stack">
<div class="pill">🛡️ ${keys[0]}<b>${d.metrics[keys[0]]}%</b></div>
<div class="pill">🛒 ${keys[2]||keys[1]}<b>${d.metrics[keys[2]]||d.metrics[keys[1]]}%</b></div>
<div class="pill warn">👤 Labor<b>${d.metrics["Labor"]||88}%</b></div>
</div>

<div class="circle">
<div class="dept">${d.name}</div>
<div class="score">${d.score}%</div>
<div class="label">POSITIVE TREND</div>
<div class="mt">TOP MISSION</div>
<div class="mission">${d.mission}</div>
</div>

<div class="stack">
<div class="pill">⚙️ ${keys[1]}<b>${d.metrics[keys[1]]}%</b></div>
<div class="pill">🎓 Training<b>${d.metrics["Training"]||91}%</b></div>
<div class="pill">⭐ CX<b>93%</b></div>
</div>
</div>

<div class="mission-card">
<h3>Top Priority Guided Mission</h3>
<p>${d.mission}</p>
<p><b>Expected Result:</b> ${d.impact}</p>
</div>
</div>`;
}

function renderOrders(d){
appView.innerHTML=panel("ORDERS","blue",`
<h3>${d.name} Order Guidance</h3>
${d.order.map(x=>`<div class="row"><div><b>${x[0]}</b><br><small>${x[2]}</small></div><span class="badge">${x[1]}</span></div>`).join("")}
<button class="action green" onclick="setScreen('results')">Approve → Results</button>`);
}

function renderTemperature(d){
appView.innerHTML=panel("TEMPERATURE","",`
<h3>Step 1 of 6</h3>
<div class="progress"><span style="width:18%"></span></div>
<div class="row"><b>Location</b><span>${d.tempStep}</span></div>
<div class="row"><b>Required</b><span class="badge">${d.tempRange}</span></div>
<div class="row"><b>Current Reading</b><span>Tap to Enter</span></div>
<button class="action green" onclick="setScreen('mission')">Enter & Continue</button>`);
}

function renderProduction(d){
appView.innerHTML=panel("PRODUCTION","green",`
<h3>${d.name} Plan</h3>
${d.production.map(x=>`<div class="row"><div><b>${x[0]}</b><br><small>${x[2]}</small></div><span class="badge">${x[1]}</span></div>`).join("")}
<button class="action green" onclick="setScreen('mission')">Start Mission</button>`);
}

function renderReplenishment(d){
appView.innerHTML=panel("REPLENISHMENT","green",`
<h3>Prioritized Walk</h3>
${d.replenishment.map((x,i)=>`<div class="row"><b>${i+1}. ${x}</b><span class="${i<2?'risk':i<4?'warn':'good'}">${i<2?'High':i<4?'Med':'Low'}</span></div>`).join("")}
<div class="row"><b>Estimated Time</b><span>25 min</span></div>
<button class="action green" onclick="setScreen('mission')">Start Walk</button>`);
}

function renderFreshStart(d){
appView.innerHTML=panel("FRESH START","purple",`
<h2>Good Morning, Sarah</h2>
<div class="row"><b>Learning</b><span>${d.training}</span></div>
<div class="row"><b>Time</b><span>3 Minutes</span></div>
<div class="row"><b>Progress</b><span>75%</span></div>
<div class="progress"><span style="width:75%"></span></div>
<button class="action" onclick="setScreen('training')">Begin Training</button>`);
}

function renderTraining(d){
appView.innerHTML=panel("TRAINING","purple",`
<h3>Associate Development</h3>
<div class="row"><b>Module</b><span>${d.training}</span></div>
<div class="row"><b>Coach</b><span>Dept Leader</span></div>
<div class="row"><b>Focus</b><span>${d.name} Execution</span></div>
<button class="action" onclick="setScreen('deptLeader')">Send to Leader</button>`);
}

function renderAlerts(d){
appView.innerHTML=panel("ALERTS","",`
<h3>Active Alert</h3>
<div class="row"><b class="risk">Priority</b><span>${d.alert}</span></div>
<div class="row"><b>Action</b><span>${d.mission}</span></div>
<button class="action red" onclick="setScreen('mission')">Resolve Mission</button>`);
}

function renderMission(d){
appView.innerHTML=panel("GUIDED MISSION","green",`
<h3>${d.mission}</h3>
<div class="row"><b>Department</b><span>${d.name}</span></div>
<div class="row"><b>Impact</b><span class="good">${d.impact}</span></div>
<div class="row"><b>Step 1</b><span>Fresh Start</span></div>
<div class="row"><b>Step 2</b><span>Task / Verify / Coach</span></div>
<button class="action green" onclick="setScreen('results')">Complete → Results</button>`);
}

function renderLeader(){
appView.innerHTML=panel("LEADER VIEW","blue",`
<h3>Select Role</h3>
<button class="choice" onclick="setScreen('deptLeader')">Department Leader <span>›</span></button>
<button class="choice" onclick="setScreen('storeLeader')">Store Leader <span>›</span></button>
<button class="choice" onclick="setScreen('districtLeader')">District Leader <span>›</span></button>`);
}

function renderDeptLeader(d){
appView.innerHTML=panel(`${d.name} LEADER`,"blue",`
<div class="row"><b>Composite</b><span class="good">${d.score}%</span></div>
${Object.entries(d.metrics).slice(0,5).map(([k,v])=>`<div class="row"><b>${k}</b><span>${v}%</span></div>`).join("")}
<div class="row"><b>Mission</b><span>${d.mission}</span></div>
<button class="action green" onclick="setScreen('mission')">View Action Plan</button>`);
}

function renderStoreLeader(){
const rows=departments.map(d=>`<div class="row"><b>${d.name}</b><span class="${d.score>=90?'good':'warn'}">${d.score}%</span></div>`).join("");
appView.innerHTML=panel("STORE LEADER","blue",`
<div class="row"><b>Store Composite</b><span class="good">92%</span></div>
${rows}
<button class="action" onclick="setScreen('results')">View Store Results</button>`);
}

function renderDistrictLeader(){
appView.innerHTML=panel("DISTRICT LEADER","blue",`
<div class="row"><b>District Composite</b><span class="good">91%</span></div>
<div class="row"><b>Top Store</b><span>Store #129 · 94%</span></div>
<div class="row"><b>Support Needed</b><span>Bakery Consistency</span></div>
<div class="row"><b>Rollout Signal</b><span class="good">Pilot Ready</span></div>
<button class="action" onclick="setScreen('results')">Rollout Metrics</button>`);
}

function renderResults(){
appView.innerHTML=panel("RESULTS","gold",`
<h3>This Week vs Last Week</h3>
<div class="row"><b>Compliance</b><span class="good">+8%</span></div>
<div class="row"><b>Shrink</b><span class="good">-4%</span></div>
<div class="row"><b>Sales</b><span class="good">+2%</span></div>
<div class="row"><b>Training</b><span class="good">+15%</span></div>
<div class="row"><b>Customer Satisfaction</b><span class="good">+3%</span></div>
<button class="action green" onclick="setScreen('home')">Return Home</button>`);
}

function panel(title,colorClass,body){
return `<section class="panel ${colorClass}"><header>${title}</header><div class="panel-body">${body}</div></section>`;
}

document.querySelectorAll("[data-screen]").forEach(btn=>{
btn.addEventListener("click",()=>setScreen(btn.dataset.screen));
});

document.getElementById("deptBtn").addEventListener("click",()=>{
deptIndex=(deptIndex+1)%departments.length;
historyStack=[];
setScreen("home",false);
});

document.getElementById("homeBtn").addEventListener("click",()=>{
historyStack=[];
setScreen("home",false);
});

document.getElementById("backBtn").addEventListener("click",()=>{
const previous=historyStack.pop();
setScreen(previous||"home",false);
});

document.getElementById("demoBtn").addEventListener("click",()=>{
setScreen(demoFlow[demoStep],true);
demoStep=(demoStep+1)%demoFlow.length;
});

render();
</script>
</body>
</html>
